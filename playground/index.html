<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>emotion-scroll playground</title>
    <link rel="stylesheet" href="/src/styles/emotion-scroll.css" />
    <style>
      body { margin: 0; font-family: monospace; }
      section { height: 100vh; display: flex; align-items: center; justify-content: center; font-size: 48px; }
      section:nth-child(odd) { background: #eef; }
      #hud { position: fixed; top: 8px; left: 8px; background: #000c; color: #0f0; padding: 8px 12px; z-index: 10; font-size: 13px; white-space: pre; }
    </style>
  </head>
  <body>
    <div id="hud"></div>
    <main>
      <section>1</section><section>2</section><section>3</section><section>4</section>
      <section>5</section><section>6</section><section>7</section><section>8</section>
      <section>9</section><section>10</section>
    </main>
    <script type="module" src="/playground/main.ts"></script>
  </body>
</html>
